services:
  mysql:
    image: mysql:8.4
    container_name: chavenamao-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-corretor_imoveis}
      MYSQL_USER: ${DB_USERNAME:-corretor_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-CorretorApp_2026!}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-CorretorApp_2026!}
      TZ: America/Sao_Paulo
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal

  chavenamao:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chavenamao
    restart: unless-stopped
    environment:
      APP_NAME: Chave na Mao
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://chavenamao.company
      APP_KEY: ${APP_KEY}
      APP_LOCALE: ${APP_LOCALE:-pt_BR}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-pt_BR}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_STACK: ${LOG_STACK:-single}
      LOG_LEVEL: ${LOG_LEVEL:-error}

      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD:-CorretorApp_2026!}

      CACHE_STORE: ${CACHE_STORE:-file}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_DOMAIN: chavenamao.company
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-public}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}

      TZ: America/Sao_Paulo

      VIRTUAL_HOST: chavenamao.company
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: chavenamao.company
      LETSENCRYPT_EMAIL: euclides@chavenamao.company
    volumes:
      - ./.env:/var/www/html/.env:ro
      - laravel_uploads:/var/www/html/storage/app/public
      - laravel_logs:/var/www/html/storage/logs
    depends_on:
      - mysql
    command: >
      sh -c "mkdir -p storage/app/public storage/logs public &&
      chown -R www-data:www-data storage bootstrap/cache &&
      php artisan storage:link || true &&
      apache2-foreground"
    networks:
      - internal
      - stack_nginx-proxy

volumes:
  mysql_data:
  laravel_uploads:
  laravel_logs:

networks:
  internal:
  stack_nginx-proxy:
    external: true
